version: 2

project_name: mbview-go

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: mbview-go
    main: ./cmd/mbview-go
    binary: mbview-go
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mbview-go/mbview-go/internal/mbview.Version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: git
